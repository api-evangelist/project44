principles:
  - name: Visibility
    description: Subscription-line cost only; no public consumption telemetry. Customers track shipment-volume
      and integration counts inside the project44 portal.
  - name: Allocation
    description: Allocate the contract by business unit, lane, or carrier program internally; project44
      does not expose per-call cost dimensions externally.
  - name: Optimization
    description: Renegotiate scope, tiers, and integration count at renewal; consolidate overlapping
      visibility programs.
  - name: Accountability
    description: Spend is owned by the supply-chain / logistics function that signs the master subscription
      agreement.
