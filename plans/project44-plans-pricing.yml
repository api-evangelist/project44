description: project44 is an enterprise supply-chain visibility platform with an API-first architecture
  but no publicly listed pricing. The vendor markets via "Get a demo" / "Contact sales" calls-to-action;
  plans, quotas, and prices are negotiated with the customer.
notes: project44 does not publish pricing tiers. Reconciliation reduced the scaffold to a single Contact
  Sales plan to avoid fabricating prices or quotas.
